version: 2
updates:
  # keep the SHA-pinned action refs fresh
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  # the docs site is its own pnpm project; without this it gets alerts but no update PRs
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      site-dependencies:
        patterns: ['*']
