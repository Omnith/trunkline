name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publishing / provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck && pnpm run lint && pnpm test
      - name: Skip if this version is already on npm (idempotent re-runs)
        id: guard
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "trunkline@$V" version >/dev/null 2>&1; then
            echo "already published trunkline@$V - skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.skip == 'false'
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1; node22 bundles 10.x
      - if: steps.guard.outputs.skip == 'false'
        run: npm publish --provenance --access public
