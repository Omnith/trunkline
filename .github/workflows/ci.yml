name: ci
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# empty default: each job states the least privilege it needs
permissions: {}

jobs:
  # cheap first pass: on pull_request, decide whether any *material* (code) file
  # changed. docs-only PRs (README, docs/**, assets/**, LICENSE, **/*.md, site/**)
  # skip the test matrix and docker smoke below. required-check-safe: skipped
  # jobs still REPORT (as skipped), unlike an on.paths-ignore filter which would
  # leave a required status check pending forever and block the PR.
  changes:
    permissions:
      contents: read
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Detect material (code) changes
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          # non-pull_request events (push to main, tag pushes) always run everything
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "event=${{ github.event_name }}: running full pipeline"
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # non-material paths: docs, assets, license, markdown anywhere, and
          # site/** (the pages workflow owns site/, so it is non-material here)
          non_material='(^docs/|^assets/|^site/|^LICENSE$|\.md$)'
          changed="$(git diff --name-only "$BASE...$HEAD")"
          echo "changed files:"
          printf '%s\n' "$changed"
          material="$(printf '%s\n' "$changed" | grep -vE "$non_material" || true)"
          if [ -n "$material" ]; then
            echo "material (code) changes detected:"
            printf '%s\n' "$material"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs-only PR: skipping test matrix + docker smoke"
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    # run on any non-PR event (push/tag) or when a PR touched material files
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - run: corepack enable
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm test

  docker:
    needs: [test, changes]
    # mirror the test gate so a docs-only PR skips the smoke build too; a failed
    # test still skips docker (a custom if without always() keeps that default).
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build amd64 image for smoke
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: trunkline:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test image (health + admin invite)
        run: |
          docker volume create tl-smoke
          docker run -d --name tl -p 47472:4747 -v tl-smoke:/data trunkline:smoke
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:47472/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then docker logs tl; exit 1; fi
          out=$(docker run --rm -v tl-smoke:/data trunkline:smoke admin invite --name ci-smoke)
          echo "$out"
          echo "$out" | grep -q "tl-invite-" || exit 1
          out2=$(docker exec tl node dist/trunkline.js admin invite --name ci-smoke-exec)
          echo "$out2"
          echo "$out2" | grep -q "tl-invite-" || exit 1
          docker rm -f tl
      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/omnith/trunkline
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - name: Build and push multiarch
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
