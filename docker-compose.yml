services:
  trunkline:
    image: ghcr.io/omnith/trunkline:latest
    # registry image is private: `docker compose up -d --build` builds from this
    # clone instead (and tags it under the image name above)
    build: .
    container_name: trunkline
    ports:
      - '4747:4747'
    volumes:
      - trunkline-data:/data
    restart: unless-stopped

volumes:
  trunkline-data:
    name: trunkline-data
