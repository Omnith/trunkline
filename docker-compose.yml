services:
  trunkline:
    image: ghcr.io/omnith/trunkline:latest
    # `docker compose up -d` pulls the published image; add --build to build from
    # this clone instead (tags it under the image name above)
    build: .
    container_name: trunkline
    ports:
      - '4747:4747'
    volumes:
      - trunkline-data:/data
    restart: unless-stopped

volumes:
  trunkline-data:
    name: trunkline-data
